# Gate único: falha aqui = PR vermelho até corrigir — ver docs/PROTOCOLO-QA-GATE.md
name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependências Python (backend + testes)
        run: pip install -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gate (scripts/verify.sh)
        run: bash scripts/verify.sh
